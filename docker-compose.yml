# This file connects the frontend and backend deployment containers for Docker or Dokploy.
# Edit this file when container ports, shared env values, or persistent volumes change.
# Copy a service block here when you add another small deployment service.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.docker
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8081
      DB_PATH: /data/app.sqlite3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8089}:8081"
    restart: unless-stopped
    volumes:
      - sqlite_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8089}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8088}:8080"
    restart: unless-stopped

volumes:
  sqlite_data:
